<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:halo="https://halo.run"
      th:replace="~{modules/layout :: layout(content=~{::content}, hero=~{}, isHome=false)}">
<body>
<th:block th:fragment="content">

  <article class="moe-card moe-article"
           th:with="pt=${singlePage.spec.title},
                    pkey=${(#strings.contains(pt,'关于') or #strings.containsIgnoreCase(pt,'about')) ? 'heart'
                          : ((#strings.contains(pt,'友链') or #strings.contains(pt,'链接') or #strings.containsIgnoreCase(pt,'link') or #strings.containsIgnoreCase(pt,'friend')) ? 'link'
                          : ((#strings.contains(pt,'留言') or #strings.contains(pt,'联系') or #strings.containsIgnoreCase(pt,'message') or #strings.containsIgnoreCase(pt,'contact')) ? 'mail'
                          : ((#strings.contains(pt,'我的') or #strings.contains(pt,'作者') or #strings.contains(pt,'简介')) ? 'user'
                          : 'doc')))}">
    <div class="moe-page-head">
      <h1 class="moe-page-title">
        <span class="moe-page-title-icon"><th:block th:replace="~{modules/icons :: icon(${pkey})}"></th:block></span>
        <span th:text="${pt}">页面标题</span>
      </h1>
      <div class="moe-article-meta" th:if="${singlePage.stats != null}">
        <span class="moe-meta-item" th:if="${singlePage.spec.publishTime != null}">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
          <span th:text="${#temporals.format(singlePage.spec.publishTime, 'yyyy-MM-dd', 'Asia/Shanghai')}">日期</span>
        </span>
        <span class="moe-meta-item">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          <span th:text="${singlePage.stats.visit}">0</span>
        </span>
      </div>
    </div>
    <div class="moe-post-content" th:utext="${singlePage.content.content}">正文</div>
  </article>

  <!-- 评论（受页面「允许评论」开关控制） -->
  <section class="moe-card moe-comments" id="comments"
           th:with="csys=${theme.config.comment?.comment_system} ?: 'moesora'"
           th:if="${singlePage.spec.allowComment and csys != 'none'}">
    <h3 class="moe-card-title"><span class="moe-title-ico"><th:block th:replace="~{modules/icons :: icon('comment')}"></th:block></span>评论</h3>

    <!-- Moesora 内置评论（kind=SinglePage） -->
    <div th:if="${csys == 'moesora'}" id="moe-comment"
         th:attr="data-name=${singlePage.metadata.name},data-kind='SinglePage'"></div>

    <!-- Halo 原生评论 -->
    <halo:comment th:if="${csys == 'native'}"
                  group="content.halo.run" kind="SinglePage" th:attr="name=${singlePage.metadata.name}"/>

    <!-- Twikoo（客户端脚本已内置） -->
    <div th:if="${csys == 'twikoo'}" id="tcomment"
         th:attr="data-env=${theme.config.comment?.twikoo_env_id},data-js=@{/assets/lib/twikoo/twikoo.all.min.js(v=${theme.spec.version})}"></div>

    <!-- Waline（客户端脚本与样式已内置） -->
    <div th:if="${csys == 'waline'}" id="waline"
         th:attr="data-server=${theme.config.comment?.waline_server},data-js=@{/assets/lib/waline/waline.js(v=${theme.spec.version})},data-css=@{/assets/lib/waline/waline.css(v=${theme.spec.version})}"></div>
  </section>

</th:block>
</body>
</html>
