<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:halo="https://halo.run"
      th:replace="~{modules/layout :: layout(content=~{::content}, hero=~{}, isHome=false)}">
<body>
<th:block th:fragment="content">
  <article class="moe-card moe-article"
           th:with="acover=${(post.spec.cover != null and post.spec.cover != '') ? post.spec.cover : (theme.config.post?.default_thumbnail)}">

    <!-- 有封面：大图卡片，标题/信息/分类浮在图上 -->
    <header th:if="${!#strings.isEmpty(acover)}" class="moe-article-hero" id="moe-hero"
            th:style="'--hero-bg:url(' + ${acover} + ')'">
      <div class="moe-article-hero-cats" th:if="${post.categories != null and !post.categories.isEmpty()}">
        <a th:each="cat : ${post.categories}" th:href="${cat.status.permalink}"
           th:text="${cat.spec.displayName}">分类</a>
      </div>
      <div class="moe-article-hero-inner">
        <h1 class="moe-article-title" th:text="${post.spec.title}">文章标题</h1>
        <div class="moe-article-meta moe-article-meta-hero">
          <span class="moe-meta-item" th:if="${post.spec.publishTime != null}">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
            <span th:text="${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd', 'Asia/Shanghai')}">日期</span>
          </span>
          <span class="moe-meta-item" th:if="${post.stats != null}">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            <span th:text="${post.stats.visit}">0</span>
          </span>
          <span class="moe-meta-item" th:if="${post.stats != null}">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.2A8.5 8.5 0 1 1 21 11.5z"/></svg>
            <span th:text="${post.stats.comment}">0</span>
          </span>
          <span class="moe-meta-item" th:if="${post.stats != null}">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 1 0-7.8 7.8L12 21l8.8-8.6a5.5 5.5 0 0 0 0-7.8z"/></svg>
            <span class="moe-upvote-n" th:text="${post.stats.upvote}">0</span>
          </span>
        </div>
      </div>
    </header>

    <!-- 无封面：普通标题 -->
    <div th:if="${#strings.isEmpty(acover)}" class="moe-article-head">
      <h1 class="moe-article-title" th:text="${post.spec.title}">文章标题</h1>
      <div class="moe-article-meta">
        <span th:if="${post.spec.publishTime != null}"
              th:text="${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd', 'Asia/Shanghai')}">日期</span>
        <span th:if="${post.categories != null and !post.categories.isEmpty()}" class="moe-meta-sep">·</span>
        <a th:each="cat : ${post.categories}" class="moe-meta-cat moe-meta-item"
           th:href="${cat.status.permalink}">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h3.6l2 2.4H19a2 2 0 0 1 2 2V18a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/></svg>
          <span th:text="${cat.spec.displayName}">分类</span></a>
      </div>
    </div>

    <div class="moe-post-content" th:utext="${post.content.content}">正文</div>

    <div class="moe-article-tags" th:if="${post.tags != null and !post.tags.isEmpty()}">
      <a th:each="tag : ${post.tags}" class="moe-chip"
         th:href="${tag.status.permalink}"
         th:style="${tag.spec.color != null and tag.spec.color != '#ffffff'} ? '--moe-c:' + ${tag.spec.color} : ''"
         th:text="'# ' + ${tag.spec.displayName}"></a>
    </div>

    <!-- 文章分享 -->
    <div class="moe-article-share" th:if="${theme.config.post?.enable_post_share}">
      <span class="moe-share-label">分享到</span>
      <button type="button" class="moe-share-btn" data-share="copy" title="复制链接">
        <th:block th:replace="~{modules/icons :: social('link')}"></th:block>
      </button>
      <button type="button" class="moe-share-btn is-weibo" data-share="weibo" title="微博">
        <th:block th:replace="~{modules/icons :: social('weibo')}"></th:block>
      </button>
      <button type="button" class="moe-share-btn is-qq" data-share="qzone" title="QQ空间">
        <th:block th:replace="~{modules/icons :: social('qq')}"></th:block>
      </button>
      <button type="button" class="moe-share-btn is-telegram" data-share="telegram" title="Telegram">
        <th:block th:replace="~{modules/icons :: social('telegram')}"></th:block>
      </button>
      <button type="button" class="moe-share-btn is-twitter" data-share="twitter" title="X / Twitter">
        <th:block th:replace="~{modules/icons :: social('twitter')}"></th:block>
      </button>
    </div>
    <script th:if="${theme.config.post?.enable_post_share}">
    (function(){
      var box=document.querySelector(".moe-article-share");
      if(!box) return;
      box.addEventListener("click", function(e){
        var b=e.target.closest("[data-share]"); if(!b) return;
        var u=encodeURIComponent(location.href), t=encodeURIComponent(document.title);
        var map={
          weibo:"https://service.weibo.com/share/share.php?url="+u+"&title="+t,
          qzone:"https://sns.qzone.qq.com/cgi-bin/qzshare/cgi_qzshare_onekey?url="+u+"&title="+t,
          telegram:"https://t.me/share/url?url="+u+"&text="+t,
          twitter:"https://twitter.com/intent/tweet?url="+u+"&text="+t
        };
        var k=b.getAttribute("data-share");
        if(k==="copy"){
          var done=function(){ b.classList.add("copied"); setTimeout(function(){b.classList.remove("copied");},1200); };
          if(navigator.clipboard){ navigator.clipboard.writeText(location.href).then(done,done); }
          else{ var ta=document.createElement("textarea"); ta.value=location.href; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");}catch(err){} document.body.removeChild(ta); done(); }
          return;
        }
        if(map[k]) window.open(map[k],"_blank","noopener,width=640,height=540");
      });
    })();
    </script>

    <!-- 打赏 -->
    <div class="moe-reward" th:if="${theme.config.post?.enable_reward} ?: false">
      <button type="button" class="moe-reward-btn" th:attr="data-name=${post.metadata.name}" onclick="this.nextElementSibling.hidden=!this.nextElementSibling.hidden">
        ♥ 赞赏支持
      </button>
      <div class="moe-reward-codes" hidden>
        <figure th:if="${theme.config.post?.reward_wechat}">
          <img th:src="${theme.config.post.reward_wechat}" alt="微信"/>
          <figcaption>微信</figcaption>
        </figure>
        <figure th:if="${theme.config.post?.reward_alipay}">
          <img th:src="${theme.config.post.reward_alipay}" alt="支付宝"/>
          <figcaption>支付宝</figcaption>
        </figure>
      </div>
    </div>

    <!-- 版权 -->
    <div class="moe-copyright" th:if="${theme.config.post?.enable_copyright} ?: true">
      <p>本文采用知识共享署名协议，转载请注明出处。</p>
      <p th:if="${post.status.permalink}">
        链接：<a th:href="${post.status.permalink}" th:text="${post.status.permalink}"></a>
      </p>
    </div>
  </article>

  <!-- 评论 -->
  <section class="moe-card moe-comments" id="comments"
           th:with="csys=${theme.config.comment?.comment_system} ?: 'moesora'"
           th:if="${post.spec.allowComment and csys != 'none'}">
    <h3 class="moe-card-title"><span class="moe-title-ico"><th:block th:replace="~{modules/icons :: icon('comment')}"></th:block></span>评论</h3>

    <!-- Moesora 内置评论（主题自带，调用 Halo 公开评论 API；游客昵称+QQ+邮箱） -->
    <div th:if="${csys == 'moesora'}" id="moe-comment" th:attr="data-name=${post.metadata.name}"></div>

    <!-- Halo 原生评论 -->
    <halo:comment th:if="${csys == 'native'}"
                  group="content.halo.run" kind="Post" th:attr="name=${post.metadata.name}"/>

    <!-- Twikoo（客户端脚本已内置） -->
    <div th:if="${csys == 'twikoo'}" id="tcomment"
         th:attr="data-env=${theme.config.comment?.twikoo_env_id},data-js=@{/assets/lib/twikoo/twikoo.all.min.js(v=${theme.spec.version})}"></div>

    <!-- Waline（客户端脚本与样式已内置） -->
    <div th:if="${csys == 'waline'}" id="waline"
         th:attr="data-server=${theme.config.comment?.waline_server},data-js=@{/assets/lib/waline/waline.js(v=${theme.spec.version})},data-css=@{/assets/lib/waline/waline.css(v=${theme.spec.version})}"></div>
  </section>
</th:block>
</body>
</html>
