<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{modules/layout :: layout(content=~{::content}, hero=~{}, isHome=false)}">
<body>
<th:block th:fragment="content">
  <div class="moe-page-head moe-card">
    <h1 class="moe-page-title">
      <span class="moe-page-title-icon"><th:block th:replace="~{modules/icons :: icon('tag')}"></th:block></span>
      <span th:text="${tag.spec.displayName}">标签</span>
    </h1>
  </div>
  <div class="moe-post-list">
    <th:block th:each="post : ${posts.items}">
      <th:block th:replace="~{modules/post-card :: card(${post})}"></th:block>
    </th:block>
    <p th:if="${posts.items.isEmpty()}" class="moe-empty">这个标签还没有文章 (｡･ω･｡)</p>
  </div>
  <div th:replace="~{modules/pagination :: pagination(${posts})}"></div>
</th:block>
</body>
</html>
